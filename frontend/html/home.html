<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Ponto 8</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../img/logo8.png">
</head>
<body>

<div class="shell">

  <header class="topbar">
    <span class="topbar__logo">PONTO 8 MOTORS</span>
    <span class="topbar__subtitle">Sistema de Gestão</span>
  </header>

  <nav class="sidebar">
    <span class="sidebar__section">Navegação</span>
    <a href="home.html" class="nav-link active">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Dashboard
    </a>
    <span class="sidebar__section">Cadastros</span>
    <a href="listClient.html" class="nav-link">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Clientes
    </a>
    <a href="listVehicle.html" class="nav-link">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="1" y="3" width="15" height="13" rx="2"/>
        <path d="M16 8h4l3 3v5h-7V8z"/>
        <circle cx="5.5" cy="18.5" r="2.5"/>
        <circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
      Veículos
    </a>
    <a href="listParts.html" class="nav-link">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
      Peças
    </a>
  </nav>

  <main class="main">

    <div class="page-header">
      <div>
        <h1 class="page-title">DASH<span>BOARD</span></h1>
        <p class="page-meta">Visão geral do sistema</p>
      </div>
    </div>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-card__label">Clientes</div>
        <div class="stat-card__value" id="count-clients">—</div>
        <div class="stat-card__sub">cadastrados</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Veículos</div>
        <div class="stat-card__value" id="count-vehicles">—</div>
        <div class="stat-card__sub">registrados</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Peças</div>
        <div class="stat-card__value" id="count-parts">—</div>
        <div class="stat-card__sub">no estoque</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Estoque total</div>
        <div class="stat-card__value" id="count-stock">—</div>
        <div class="stat-card__sub">unidades</div>
      </div>
    </div>

    <div class="page-header" style="margin-top:8px; margin-bottom:16px;">
      <h2 style="font-family:var(--font-display);font-size:24px;letter-spacing:1px;color:var(--white-dim)">AÇÕES RÁPIDAS</h2>
    </div>

    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <a href="listClient.html" class="btn btn-primary">+ Novo Cliente</a>
      <a href="listVehicle.html" class="btn btn-ghost">+ Novo Veículo</a>
      <a href="listParts.html" class="btn btn-ghost">+ Nova Peça</a>
    </div>
  </main>
</div>

<script type="module">
  import { getClients, getVehicles, getParts } from '../js/api.js';

  async function loadDashboard() {
    const [cRes, vRes, pRes] = await Promise.all([getClients(), getVehicles(), getParts()]);
    const clients  = cRes.data  || [];
    const vehicles = vRes.data  || [];
    const parts    = pRes.data  || [];

    document.getElementById('count-clients').textContent  = clients.length;
    document.getElementById('count-vehicles').textContent = vehicles.length;
    document.getElementById('count-parts').textContent    = parts.length;

    const totalStock = parts.reduce((acc, p) => acc + (p.amount || 0), 0);
    document.getElementById('count-stock').textContent = totalStock;

    renderRecentClients(clients.slice(-5).reverse());
  }

  function renderRecentClients(clients) {
    const wrap = document.getElementById('recent-clients-wrap');
    if (!clients.length) {
      wrap.innerHTML = '<div class="empty-state"><div class="empty-state__icon">👥</div><h3>Nenhum cliente</h3></div>';
      return;
    }
    const rows = clients.map(c => `
      <tr>
        <td class="td-id">#${c.id}</td>
        <td>${c.name}</td>
        <td>${c.email}</td>
        <td>${c.phone}</td>
        <td><a href="listClient.html" class="btn btn-ghost btn-sm">Ver</a></td>
      </tr>`).join('');
    wrap.innerHTML = `
      <table>
        <thead><tr><th>ID</th><th>Nome</th><th>Email</th><th>Telefone</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  loadDashboard();
</script>

</body>
</html>
