<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veículos | Ponto 8</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../img/logo8.png">
</head>
<body>

<div class="shell">

  <header class="topbar">
    <span class="topbar__logo">PONTO 8 MOTORS</span>
    <span class="topbar__subtitle">Veículos</span>
  </header>

  <nav class="sidebar">
    <span class="sidebar__section">Navegação</span>
    <a href="home.html" class="nav-link">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Dashboard
    </a>
    <span class="sidebar__section">Cadastros</span>
    <a href="listClient.html" class="nav-link">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Clientes
    </a>
    <a href="listVehicle.html" class="nav-link active">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="1" y="3" width="15" height="13" rx="2"/>
        <path d="M16 8h4l3 3v5h-7V8z"/>
        <circle cx="5.5" cy="18.5" r="2.5"/>
        <circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
      Veículos
    </a>
    <a href="listParts.html" class="nav-link">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
      Peças
    </a>
  </nav>

  <main class="main">
    <div class="page-header">
      <div>
        <h1 class="page-title">VEÍCU<span>LOS</span></h1>
        <p class="page-meta" id="meta-count">Carregando...</p>
      </div>
      <button class="btn btn-primary" id="btn-new">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Novo Veículo
      </button>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Buscar por modelo ou marca..." />
      </div>
    </div>

    <div class="table-wrap">
      <div id="table-wrap"><div class="spinner"></div></div>
    </div>
  </main>
</div>

<!-- MODAL CRIAR -->
<div class="modal-overlay" id="modal-create">
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title">NOVO VEÍCULO</h2>
      <button class="modal__close" id="close-create">✕</button>
    </div>
    <form id="form-create" autocomplete="off">
      <div class="form-grid">
        <div class="form-group">
          <label for="c-model">Modelo</label>
          <input id="c-model" name="vehicleModel" type="text" placeholder="Civic" required />
        </div>
        <div class="form-group">
          <label for="c-brand">Marca</label>
          <input id="c-brand" name="vehicleBrand" type="text" placeholder="Honda" required />
        </div>
        <div class="form-group">
          <label for="c-year">Ano</label>
          <input id="c-year" name="year" type="number" placeholder="2024" min="1900" max="2100" required />
        </div>
        <div class="form-group">
          <label for="c-plate">Placa</label>
          <input id="c-plate" name="plate" type="text" placeholder="ABC-1234" required />
        </div>
        <div class="form-group full">
          <label for="c-chassi">Chassi</label>
          <input id="c-chassi" name="chassi" type="text" placeholder="9BWZZZ377VT000000" required />
        </div>
        <div class="form-group full">
          <label for="c-client">Cliente (proprietário)</label>
          <select id="c-client" name="cliendId" required>
            <option value="">Selecione um cliente...</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="cancel-create">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title">EDITAR VEÍCULO</h2>
      <button class="modal__close" id="close-edit">✕</button>
    </div>
    <form id="form-edit" autocomplete="off">
      <input type="hidden" id="e-id" />
      <div class="form-grid">
        <div class="form-group">
          <label for="e-model">Modelo</label>
          <input id="e-model" name="vehicleModel" type="text" />
        </div>
        <div class="form-group">
          <label for="e-brand">Marca</label>
          <input id="e-brand" name="vehicleBrand" type="text" />
        </div>
        <div class="form-group">
          <label for="e-year">Ano</label>
          <input id="e-year" name="year" type="number" />
        </div>
        <div class="form-group">
          <label for="e-plate">Placa</label>
          <input id="e-plate" name="plate" type="text" />
        </div>
        <div class="form-group full">
          <label for="e-chassi">Chassi</label>
          <input id="e-chassi" name="chassi" type="text" />
        </div>
        <div class="form-group full">
          <label for="e-client">Cliente (proprietário)</label>
          <select id="e-client" name="cliendId">
            <option value="">Selecione um cliente...</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="cancel-edit">Cancelar</button>
        <button type="submit" class="btn btn-primary">Atualizar</button>
      </div>
    </form>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-box__icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
    </div>
    <div class="confirm-box__title">REMOVER VEÍCULO</div>
    <div class="confirm-box__label">
      Tem certeza que deseja remover <strong id="confirm-name"></strong>?<br/>
      Esta ação não pode ser desfeita.
    </div>
    <div class="confirm-box__actions">
      <button class="btn btn-ghost" id="confirm-cancel">Cancelar</button>
      <button class="btn btn-danger" id="confirm-ok">Remover</button>
    </div>
  </div>
</div>

<script type="module">
  import { getVehicles, getClients, createVehicle, updateVehicle, deleteVehicle } from '../js/api.js';
  import { toast, openModal, closeModal, bindModalOverlayClose } from '../js/ui.js';

  let allVehicles = [];
  let clientMap = {}; // { id: firstName }
  let pendingDeleteId = null;

  bindModalOverlayClose('modal-create');
  bindModalOverlayClose('modal-edit');
  document.getElementById('close-create').onclick  = () => closeModal('modal-create');
  document.getElementById('cancel-create').onclick = () => closeModal('modal-create');
  document.getElementById('close-edit').onclick    = () => closeModal('modal-edit');
  document.getElementById('cancel-edit').onclick   = () => closeModal('modal-edit');

  document.getElementById('btn-new').onclick = () => {
    document.getElementById('form-create').reset();
    openModal('modal-create');
  };

  // Confirm delete
  const confirmOverlay = document.getElementById('confirm-overlay');
  confirmOverlay.addEventListener('click', (e) => { if (e.target === confirmOverlay) closeConfirm(); });
  document.getElementById('confirm-cancel').onclick = closeConfirm;
  document.getElementById('confirm-ok').onclick = async () => {
    if (pendingDeleteId === null) return;
    const id = pendingDeleteId;
    closeConfirm();
    const { ok } = await deleteVehicle(id);
    if (ok) { toast('Veículo removido.'); await loadVehicles(); }
    else toast('Erro ao remover.', 'error');
  };

  function openConfirm(id, name) {
    pendingDeleteId = id;
    document.getElementById('confirm-name').textContent = name;
    confirmOverlay.classList.add('open');
  }
  function closeConfirm() {
    pendingDeleteId = null;
    confirmOverlay.classList.remove('open');
  }

  /** Popula os <select> de cliente nos dois modais */
  function populateClientSelects(clients) {
    const options = clients.map(c => {
      const firstName = c.name.split(' ')[0];
      return `<option value="${c.id}">${c.name}</option>`;
    }).join('');
    const base = '<option value="">Selecione um cliente...</option>';
    document.getElementById('c-client').innerHTML = base + options;
    document.getElementById('e-client').innerHTML = base + options;
  }

  document.getElementById('search-input').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    renderTable(allVehicles.filter(v => {
      const model = (v.vehicle_model ?? v.vehicleModel ?? '').toLowerCase();
      const brand = (v.vehicle_brand ?? v.vehicleBrand ?? '').toLowerCase();
      return model.includes(q) || brand.includes(q);
    }));
  });

  async function loadVehicles() {
    const wrap = document.getElementById('table-wrap');
    wrap.innerHTML = '<div class="spinner"></div>';

    const [vRes, cRes] = await Promise.all([getVehicles(), getClients()]);

    if (!vRes.ok || !vRes.data) {
      wrap.innerHTML = '<div class="empty-state"><h3>Erro ao carregar</h3></div>';
      return;
    }

    // Monta mapa id -> primeiro nome
    if (cRes.ok && cRes.data) {
      clientMap = {};
      cRes.data.forEach(c => {
        clientMap[c.id] = c.name.split(' ')[0];
      });
      populateClientSelects(cRes.data);
    }

    allVehicles = vRes.data;
    document.getElementById('meta-count').textContent =
      `${vRes.data.length} veículo${vRes.data.length !== 1 ? 's' : ''} registrado${vRes.data.length !== 1 ? 's' : ''}`;
    renderTable(vRes.data);
  }

  function renderTable(vehicles) {
    const wrap = document.getElementById('table-wrap');
    if (!vehicles.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-state__icon">🚗</div><h3>Nenhum veículo encontrado</h3></div>`;
      return;
    }
    const rows = vehicles.map(v => {
      const id       = v.id_vehicle    ?? v.idVehicle;
      const model    = v.vehicle_model ?? v.vehicleModel;
      const brand    = v.vehicle_brand ?? v.vehicleBrand;
      const year     = v.year;
      const plate    = v.plate;
      const chassi   = v.chassi;
      const clientId = v.client_id     ?? v.cliendId;
      const clientName = clientMap[clientId] ?? `#${clientId}`;
      return `
        <tr>
          <td class="td-id">#${id}</td>
          <td>${brand} ${model}</td>
          <td>${year}</td>
          <td><span class="chip">${plate}</span></td>
          <td style="font-size:12px;color:var(--gray-light)">${chassi}</td>
          <td>${clientName}</td>
          <td>
            <div class="td-actions">
              <button class="btn btn-ghost btn-sm" onclick="editVehicle(${id})">Editar</button>
              <button class="btn btn-danger btn-sm" onclick="triggerDelete(${id}, '${brand} ${model}')">Remover</button>
            </div>
          </td>
        </tr>`;
    }).join('');
    wrap.innerHTML = `
      <table>
        <thead><tr><th>ID</th><th>Veículo</th><th>Ano</th><th>Placa</th><th>Chassi</th><th>Cliente</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  document.getElementById('form-create').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = {
      vehicleModel: fd.get('vehicleModel'),
      vehicleBrand: fd.get('vehicleBrand'),
      year: parseInt(fd.get('year')),
      plate: fd.get('plate'),
      chassi: fd.get('chassi'),
      cliendId: parseInt(fd.get('cliendId'))
    };
    const { ok } = await createVehicle(body);
    if (ok) { toast('Veículo cadastrado!'); closeModal('modal-create'); await loadVehicles(); }
    else toast('Erro ao cadastrar.', 'error');
  });

  document.getElementById('form-edit').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = parseInt(document.getElementById('e-id').value);
    const fd = new FormData(e.target);
    const body = {};
    const map = {
      vehicleModel: v => v,
      vehicleBrand: v => v,
      year: v => parseInt(v),
      plate: v => v,
      chassi: v => v,
      cliendId: v => parseInt(v)
    };
    for (const [key, conv] of Object.entries(map)) {
      const val = fd.get(key);
      if (val !== '') body[key] = conv(val);
    }
    const { ok } = await updateVehicle(id, body);
    if (ok) { toast('Veículo atualizado!'); closeModal('modal-edit'); await loadVehicles(); }
    else toast('Erro ao atualizar.', 'error');
  });

  window.editVehicle = (id) => {
    const v = allVehicles.find(x => (x.id_vehicle ?? x.idVehicle) === id);
    if (!v) return;
    const clientId = v.client_id ?? v.cliendId;
    document.getElementById('e-id').value     = id;
    document.getElementById('e-model').value  = v.vehicle_model ?? v.vehicleModel ?? '';
    document.getElementById('e-brand').value  = v.vehicle_brand ?? v.vehicleBrand ?? '';
    document.getElementById('e-year').value   = v.year   ?? '';
    document.getElementById('e-plate').value  = v.plate  ?? '';
    document.getElementById('e-chassi').value = v.chassi ?? '';
    document.getElementById('e-client').value = clientId ?? '';
    openModal('modal-edit');
  };

  window.triggerDelete = openConfirm;

  loadVehicles();
</script>

</body>
</html>
